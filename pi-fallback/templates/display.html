<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ school_name }} Baseball Scoreboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="display-page">
    <div class="display-shell">
      <div class="display-frame" id="display-frame">
        <main class="scoreboard-display">
          <section class="linescore-panel">
            <div class="linescore-grid">
              <div class="cell label-cell school-cell">HLS</div>
              <div class="cell inning-head">1</div>
              <div class="cell inning-head">2</div>
              <div class="cell inning-head">3</div>
              <div class="cell inning-head">4</div>
              <div class="cell inning-head">5</div>
              <div class="cell inning-head">6</div>
              <div class="cell inning-head">7</div>
              <div class="cell inning-head">8</div>
              <div class="cell inning-head">9</div>
              <div class="cell inning-head">10</div>
              <div class="cell inning-head total-head">R</div>

              <div class="cell label-cell team-cell">GUEST</div>
              <div class="cell score-cell" id="guest-run-0">0</div>
              <div class="cell score-cell" id="guest-run-1">0</div>
              <div class="cell score-cell" id="guest-run-2">0</div>
              <div class="cell score-cell" id="guest-run-3">0</div>
              <div class="cell score-cell" id="guest-run-4">0</div>
              <div class="cell score-cell" id="guest-run-5">0</div>
              <div class="cell score-cell" id="guest-run-6">0</div>
              <div class="cell score-cell" id="guest-run-7">0</div>
              <div class="cell score-cell" id="guest-run-8">0</div>
              <div class="cell score-cell" id="guest-run-9">0</div>
              <div class="cell score-cell total-cell" id="guest-total">0</div>

              <div class="cell label-cell team-cell">HOME</div>
              <div class="cell score-cell" id="home-run-0">0</div>
              <div class="cell score-cell" id="home-run-1">0</div>
              <div class="cell score-cell" id="home-run-2">0</div>
              <div class="cell score-cell" id="home-run-3">0</div>
              <div class="cell score-cell" id="home-run-4">0</div>
              <div class="cell score-cell" id="home-run-5">0</div>
              <div class="cell score-cell" id="home-run-6">0</div>
              <div class="cell score-cell" id="home-run-7">0</div>
              <div class="cell score-cell" id="home-run-8">0</div>
              <div class="cell score-cell" id="home-run-9">0</div>
              <div class="cell score-cell total-cell" id="home-total">0</div>

              <div class="status-strip" id="game-status">TOP 1</div>
            </div>
          </section>

          <aside class="info-panel">
            <div class="school-block">
              <div class="school-kicker">{{ school_name }}</div>
              <div class="school-title">BASEBALL</div>
            </div>

            <div class="count-board">
              <div class="count-card balls-card">
                <span class="count-label">BALLS</span>
                <span class="count-value" id="count-balls">0</span>
              </div>
              <div class="count-card strikes-card">
                <span class="count-label">STRIKES</span>
                <span class="count-value" id="count-strikes">0</span>
              </div>
              <div class="count-card outs-card">
                <span class="count-label">OUTS</span>
                <span class="count-value" id="count-outs">0</span>
              </div>
            </div>

            <div class="meta-strip">
              <span class="pill pill-mode" id="mode-pill">FALLBACK</span>
              <span class="pill pill-connection" id="connection-pill">LIVE</span>
              <span class="updated-text" id="updated-at">Waiting for data</span>
            </div>
          </aside>
        </main>
      </div>
    </div>

    <script>
      window.SCOREBOARD_CONFIG = {
        mode: "fallback",
        modeLabel: "Fallback mode",
        requireKey: false,
        endpoints: {
          getState: "/api/state",
          updateState: "/api/state",
          resetState: "/api/reset"
        }
      };
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script src="{{ url_for('static', filename='display.js') }}"></script>
  </body>
</html>
