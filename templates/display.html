<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ school_name }} Baseball Scoreboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body
    class="display-page"
    style="--scoreboard-design-width: {{ active_design.width }}px; --scoreboard-design-height: {{ active_design.height }}px;"
  >
    <div class="display-shell">
      <div class="display-frame" id="display-frame">
        {% include display_template %}
      </div>
    </div>

    <script>
      window.SCOREBOARD_CONFIG = {
        requireKey: false,
        defaultDesignId: {{ default_design_id | tojson }},
        activeDesign: {{ active_design | tojson }},
        designs: {{ scoreboard_designs | tojson }},
        initialState: {{ initial_state | tojson }},
        endpoints: {
          getState: "/api/state",
          updateState: "/api/state",
          resetState: "/api/reset",
          websocket: "/ws"
        }
      };
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script src="{{ url_for('static', filename='display.js') }}"></script>
  </body>
</html>
