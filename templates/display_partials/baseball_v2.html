<main class="scoreboard-display scoreboard-display-baseball-v2" data-design-id="baseball-v2">
  <section class="v2-board">
    <div class="v2-linescore">
      <div class="active-inning-highlight" id="active-inning-highlight" aria-hidden="true"></div>

      <div class="v2-cell v2-corner-cell status-cell">
        <span class="heartbeat-led" id="heartbeat-led" aria-label="Websocket connection status"></span>
      </div>
      <div class="v2-cell v2-inning-head" id="inning-head-0"><span class="v2-inning-head-label">1</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-1"><span class="v2-inning-head-label">2</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-2"><span class="v2-inning-head-label">3</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-3"><span class="v2-inning-head-label">4</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-4"><span class="v2-inning-head-label">5</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-5"><span class="v2-inning-head-label">6</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-6"><span class="v2-inning-head-label">7</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-7"><span class="v2-inning-head-label">8</span></div>
      <div class="v2-cell v2-inning-head" id="inning-head-8"><span class="v2-inning-head-label">9</span></div>
      <div class="v2-cell v2-inning-head v2-overtime-cell" id="inning-head-9"><span class="v2-inning-head-label">10</span></div>
      <div class="v2-cell v2-total-head">R</div>

      <div class="v2-cell v2-team-cell" id="guest-team-cell">
        <span class="v2-at-bat-indicator v2-at-bat-indicator-up" id="guest-arrow" aria-hidden="true"></span>
        <span class="v2-team-label">GUEST</span>
      </div>
      <div class="v2-cell v2-score-cell" id="guest-run-0">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-1">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-2">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-3">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-4">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-5">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-6">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-7">0</div>
      <div class="v2-cell v2-score-cell" id="guest-run-8">0</div>
      <div class="v2-cell v2-score-cell v2-overtime-cell" id="guest-run-9">0</div>
      <div class="v2-cell v2-score-cell v2-total-cell" id="guest-total">0</div>

      <div class="v2-cell v2-team-cell" id="home-team-cell">
        <span class="v2-at-bat-indicator v2-at-bat-indicator-down" id="home-arrow" aria-hidden="true"></span>
        <span class="v2-team-label">HOME</span>
      </div>
      <div class="v2-cell v2-score-cell" id="home-run-0">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-1">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-2">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-3">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-4">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-5">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-6">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-7">0</div>
      <div class="v2-cell v2-score-cell" id="home-run-8">0</div>
      <div class="v2-cell v2-score-cell v2-overtime-cell" id="home-run-9">0</div>
      <div class="v2-cell v2-score-cell v2-total-cell" id="home-total">0</div>
    </div>

    <div class="v2-counts-panel">
      <div class="v2-count-row">
        <span class="v2-count-label">B</span>
        <span class="v2-count-value" id="count-ball">0</span>
      </div>
      <div class="v2-count-row">
        <span class="v2-count-label">S</span>
        <span class="v2-count-value" id="count-strike">0</span>
      </div>
      <div class="v2-count-row">
        <span class="v2-count-label">O</span>
        <span class="v2-count-value" id="count-out">0</span>
      </div>
    </div>
  </section>
</main>
